<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <title>TailPanel</title>
  <style>


  </style>
</head>

<body id="body" class="bg-white">



 

    <div class="main-content container ">

      

        <div class="text-center container pt-5 d-flex flex-column justify-content-center align-items-center " >

          
          <div class="d-flex align-items-center justify-content-center gap-3 mb-2" style="padding-top: 90px;">
            <div class="logo-box bg-primary text-white  px-3 rounded-3 shadow-lg fw-bold fs-3">T</div>
            <h2 class="mb-0 lh-base" style="font-size: 28px; font-weight: bold;">TailPanel</h2>
          </div>

          <p class="text-muted mb-4 mt-1">Sign in to your account</p>

       
          <div class="card card-custom p-4 shadow-lg " style="width: 400px;">

            <form>

              
              <div class="mb-3 text-start">
                <label class="form-label text-secondary-emphasis fs-6">Email Address</label>
                <div class="input-group">
                  
                    <i class="bi bi-envelope text-secondary input-group-text"></i>
                  
                  <input type="email" class="form-control " placeholder="you@example.com">
                </div>
              </div>

              <!-- Password -->
              <div class="mb-3 mt-4 text-start">
                <label class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-white">
                    <i class="bi bi-lock"></i>
                  </span>
                  <input type="password" class="form-control" placeholder="••••••••">
                  <span class="input-group-text bg-white">
                    <i class="bi bi-eye"></i>
                  </span>
                </div>
              </div>

              <!-- Remember + Forgot -->
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember">
                  <label class="form-check-label" for="remember">
                    Remember me
                  </label>
                </div>

                <a href="#" class="text-decoration-none small">
                  Forgot password?
                </a>
              </div>


              <button class="btn btn-primary w-100 py-2 mb-3">
                Sign In →
              </button>

            </form>


            <div class="divider text-secondary my-2">-----------Or continue with-----------</div>


            <div class="d-grid gap-2 d-flex justify-content-between mt-2">
              <button class="btn btn-outline-secondary social-btn w-100">
                <i class="bi bi-google text-black me-2"></i> Google
              </button>

              <button class="btn btn-outline-secondary social-btn w-100">
                <i class="bi bi-github text-black me-2"></i> GitHub
              </button>
            </div>

          </div>


          <p class="mt-4 text-muted">
            Don't have an account?
            <a href="#" class="text-decoration-none">Sign up for free</a>
          </p>

        </div>
    

    </div>


  




 






  <script src="app.js"></script>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
