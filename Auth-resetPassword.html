<head>

<body id="body" class="bg-white">



 

    <div class="main-content container ">

      

        <div class="text-center container  d-flex flex-column justify-content-center align-items-center "  style="padding-top: 100px;">

          


          
          <div class="d-flex align-items-center justify-content-center gap-3 mb-2" style="padding-top: 90px;">
            <div class="logo-box bg-primary text-white  px-3 rounded-3 shadow-lg fw-bold fs-3">T</div>
            <h2 class="mb-0 lh-base" style="font-size: 28px; font-weight: bold;">TailPanel</h2>
          </div>

          <p class="text-muted mb-4 mt-1">Reset your password</p>

       
          <div class="card card-custom p-4 shadow-lg " style="width: 400px;">

            <form>
            <h4 class="text-start">Forgot Password?</h4>
            <p class="text-start text-secondary" style="font-size: 12px;">No worries, we'll send you reset instructions.</p>
              
              <div class="mb-3 text-start">
                <label class="form-label text-secondary-emphasis fs-6">Email Address</label>
                <div class="input-group">
                  
                    <i class="bi bi-envelope text-secondary input-group-text"></i>
                  
                  <input type="email" class="form-control " placeholder="you@example.com">
                </div>
              </div>

         



              <button class="btn btn-primary w-100 py-2 mb-3">
                Reset Password →
              </button>

            </form>

        <a href="/Auth-login.html" class="m-0 mt-2 text-secondary" style="font-size: 12px;"> <i class="bi bi-arrow-left mx-2"></i>Back to login</a>
      

          </div>


          <p class="mt-4 text-muted btn border w-25 shadow-lg ">
            Need help?
            <a href="#" class="text-decoration-none">Contact Support</a>
          </p>

        </div>
    

    </div>
